<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="ureel cream button">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFDF6"/>
      <stop offset="0.55" stop-color="#F5F2EA"/>
      <stop offset="1" stop-color="#E8DCC2"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.5" stop-color="#E8DCC2"/>
      <stop offset="1" stop-color="#B99A61"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#1A1A1A" flood-opacity="0.22"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#FFFFFF" flood-opacity="0.6"/>
    </filter>
  </defs>
  <rect x="84" y="84" width="856" height="856" rx="228" fill="url(#tile)" filter="url(#shadow)"/>
  <rect x="112" y="112" width="800" height="800" rx="204" fill="none" stroke="url(#edge)" stroke-width="10" opacity="0.88"/>
  <text x="512" y="548" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="104" font-weight="500" letter-spacing="26" fill="#9A7B45">ureel</text>
</svg>
